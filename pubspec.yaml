name: connector
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: 3.41.0

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: 0.14.4
  flutter_localizations:
    sdk: flutter
  horizon:
    git:
      url: https://github.com/Assessli-tech/horizon-flutter.git
      ref: main

dev_dependencies:
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/app_icon/
    - assets/languages/
    - assets/styles/
    - shorebird.yaml
